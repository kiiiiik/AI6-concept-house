<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maison 3D - Configuration Par Défaut</title>
    <style>
        body { margin: 0; background-color: #ffffff; height: 250vh; overflow-x: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
        canvas { display: block; position: fixed; top: 0; left: 0; }

        /* --- DESIGN LIL-GUI HAUTE VISIBILITÉ --- */
        .lil-gui { 
            --background-color: #ffffff; 
            --title-background-color: #001DFC; 
            --title-text-color: #ffffff;
            --name-color: #000000;       
            --value-color: #001DFC;      
            --widget-color: #f0f0f0;     
            --focus-color: #001DFC;      
            
            top: 25px !important; 
            right: 25px !important;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 320px !important; 
            border: 1px solid #ccc;
        }

        .lil-gui .title {
            background-color: #f4f4f4 !important; 
            color: #000000 !important;            
            font-weight: 800 !important;
            border-bottom: 1px solid #ddd !important;
            padding: 8px 10px !important;
            text-transform: uppercase;
        }

        .lil-gui .name {
            font-weight: 600 !important;
            color: #000 !important; 
            font-size: 13px !important;
        }

        .lil-gui .slider-fg { background: #001DFC !important; }
        .lil-gui select { 
            border: 1px solid #001DFC !important; 
            color: #001DFC !important;
            font-weight: bold;
            background: white !important;
        }

        .lil-gui .controller {
            border-bottom: 1px solid #eee;
            padding: 5px 0;
        }
    </style>
</head>
<body>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
            "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
    import { GUI } from 'lil-gui';

    let scene, camera, renderer, composer, model, pointsMesh, bakedShadow;
    let mouse = new THREE.Vector2();
    let raycaster = new THREE.Raycaster();
    let groundPlane;
    const clock = new THREE.Clock();
    let scrollProgress = 0;
    const textureLoader = new THREE.TextureLoader();

    // --- CONFIGURATION PAR DÉFAUT MISE À JOUR ---
    const settings = {
        exposure: 1.70,
        targetZoomAmount: 1.00,
        targetRotationX: -0.01,
        targetRotationY: -1.50,
        bokehFocus: 0.3,
        bokehBlurMax: 0.007,
        rgbOffset: 0.018,
        grainIntensity: 0,
        uExcludeRadius: 3,
        pointSizeBase: 90.0,
        pointSizeHover: 150.0,
        pointsHeight: -1,
        shadowScaleX: 16.8,
        shadowScaleY: 16.8,
        shadowOpacity: 0.6,             // <-- Changé à 0.6
        shadowPosY: 0.04,
        currentShadowName: 'Diffuse Noir' // <-- Changé par défaut
    };

    const shadowList = {
        'Diffuse Bleu': 'ombre_maison-diffuse-bleu.png',
        'Diffuse Noir': 'ombre_maison-diffuse-noir.png',
        'Dure Bleu': 'ombre_maison-dure-bleu.png',
        'Dure Noir': 'ombre_maison-dure-noir.png'
    };

    init();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        const aspect = window.innerWidth / window.innerHeight;
        const d = 6.5; 
        camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 0.1, 1000);
        camera.position.set(10, 10, 10);
        camera.lookAt(0, 0, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = settings.exposure;
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.9));
        const light = new THREE.DirectionalLight(0xffffff, 2.0);
        light.position.set(10, 15, 1);
        scene.add(light);

        groundPlane = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshBasicMaterial({ visible: false }));
        groundPlane.rotateX(-Math.PI / 2);
        groundPlane.position.y = settings.pointsHeight; 
        scene.add(groundPlane);

        createInteractivePoints();

        const loader = new GLTFLoader();
        loader.load('maison.glb', (gltf) => {
            model = gltf.scene;
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.sub(center);
            scene.add(model);
            createBakedShadow(); 
            createGUI();         
            initPostProcessing();
            animate();
        });

        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('resize', onWindowResize);
        window.addEventListener('scroll', () => {
            const h = document.documentElement, b = document.body;
            scrollProgress = (h.scrollTop || b.scrollTop) / (h.scrollHeight - h.clientHeight);
        });
    }

    function createGUI() {
        const gui = new GUI({ title: '🕹️ CONFIGURATION' });
        
        const shadowFolder = gui.addFolder('Ombres Portées');
        shadowFolder.add(settings, 'currentShadowName', Object.keys(shadowList)).name('Type').onChange(v => updateShadowTexture(shadowList[v]));
        shadowFolder.add(settings, 'shadowOpacity', 0, 1).name('Opacité').onChange(v => { if (bakedShadow) bakedShadow.material.opacity = v; });
        shadowFolder.open();

        const sceneFolder = gui.addFolder('Réglages Effets');
        sceneFolder.add(settings, 'rgbOffset', 0, 0.05).name('Aberration RGB').onChange(v => {
            if(composer) composer.passes[3].uniforms.uOffset.value = v;
        });
        sceneFolder.open();
    }

    function createBakedShadow() {
        const initialTextureUrl = shadowList[settings.currentShadowName];
        textureLoader.load(initialTextureUrl, (texture) => {
            const shadowGeo = new THREE.PlaneGeometry(1, 1); 
            const shadowMat = new THREE.MeshBasicMaterial({ map: texture, transparent: true, depthWrite: false, opacity: settings.shadowOpacity });
            bakedShadow = new THREE.Mesh(shadowGeo, shadowMat);
            bakedShadow.rotation.x = -Math.PI / 2;
            bakedShadow.position.y = settings.shadowPosY; 
            bakedShadow.scale.set(settings.shadowScaleX, settings.shadowScaleY, 1);
            model.add(bakedShadow);
        });
    }

    function updateShadowTexture(textureUrl) {
        if (!bakedShadow) return;
        textureLoader.load(textureUrl, (newTexture) => {
            bakedShadow.material.map = newTexture;
            bakedShadow.material.needsUpdate = true;
        });
    }

    function createInteractivePoints() {
        const count = 70, spacing = 0.45;
        const geo = new THREE.BufferGeometry();
        const pos = new Float32Array(count * count * 3);
        for (let i = 0; i < count; i++) {
            for (let j = 0; j < count; j++) {
                let idx = (i * count + j) * 3;
                pos[idx] = (i - count / 2) * spacing;
                pos[idx + 1] = 0; 
                pos[idx + 2] = (j - count / 2) * spacing;
            }
        }
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        const mat = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 },
                uMouse: { value: new THREE.Vector3(100, 0, 100) },
                uSizeBase: { value: settings.pointSizeBase },
                uSizeHover: { value: settings.pointSizeHover },
                uExcludeRadius: { value: settings.uExcludeRadius },
                uHeight: { value: settings.pointsHeight }
            },
            vertexShader: `
                uniform float time; uniform vec3 uMouse; uniform float uSizeBase, uSizeHover, uExcludeRadius, uHeight;
                varying float vVisible, vHover;
                void main() {
                    vec3 p = position;
                    float distFromCenter = length(p.xz);
                    vVisible = smoothstep(uExcludeRadius - 0.5, uExcludeRadius + 1.0, distFromCenter);
                    p.y = uHeight + sin(distFromCenter * 0.8 - time * 1.5) * 0.08;
                    float dM = distance(p.xz, uMouse.xz);
                    vHover = smoothstep(4.0, 0.0, dM);
                    if (dM < 4.0) { p.xz += normalize(uMouse.xz - p.xz + 0.0001) * vHover * 0.2; }
                    vec4 mvPos = modelViewMatrix * vec4(p, 1.0);
                    gl_PointSize = (mix(uSizeBase, uSizeHover, vHover) * vVisible) * (0.7 / -mvPos.z);
                    gl_Position = projectionMatrix * mvPos;
                }
            `,
            fragmentShader: `
                varying float vHover, vVisible;
                void main() {
                    if (vVisible < 0.01 || distance(gl_PointCoord, vec2(0.5)) > 0.5) discard;
                    gl_FragColor = vec4(mix(vec3(0.0, 0.12, 0.98), vec3(0.0, 0.98, 0.85), vHover), mix(0.7, 1.0, vHover) * vVisible);
                }
            `,
            transparent: true, depthWrite: false
        });
        pointsMesh = new THREE.Points(geo, mat);
        scene.add(pointsMesh);
    }

    function initPostProcessing() {
        composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        const v = `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`;
        
        composer.addPass(new ShaderPass({
            uniforms: { 'tDiffuse': { value: null }, 'uFocus': { value: settings.bokehFocus }, 'uMaxBlur': { value: settings.bokehBlurMax }, 'uAspect': { value: window.innerWidth / window.innerHeight } },
            vertexShader: v,
            fragmentShader: `
                uniform sampler2D tDiffuse; uniform float uFocus, uMaxBlur, uAspect; varying vec2 vUv;
                void main() {
                    vec2 aspect = vec2(uAspect, 1.0); float d = length((vUv - 0.5) * aspect);
                    float bI = smoothstep(uFocus * uAspect, (uFocus + 0.3) * uAspect, d);
                    float bR = bI * uMaxBlur; vec4 c = vec4(0.0);
                    for(float x = -2.0; x <= 2.0; x++) { for(float y = -2.0; y <= 2.0; y++) {
                        c += texture2D(tDiffuse, vUv + vec2(x / uAspect, y) * bR);
                    } } gl_FragColor = c / 25.0;
                }
            `
        }));
        
        composer.addPass(new ShaderPass({
            uniforms: { 'tDiffuse': { value: null }, 'time': { value: 0 }, 'uIntensity': { value: settings.grainIntensity } },
            vertexShader: v,
            fragmentShader: `
                uniform sampler2D tDiffuse; uniform float time, uIntensity; varying vec2 vUv;
                void main() {
                    vec4 c = texture2D(tDiffuse, vUv);
                    float n = (fract(sin(dot(vUv + time, vec2(12.9898,78.233))) * 43758.5453) - 0.5) * uIntensity;
                    gl_FragColor = vec4(c.rgb + n, c.a);
                }
            `
        }));
        
        composer.addPass(new ShaderPass({
            uniforms: { 'tDiffuse': { value: null }, 'uOffset': { value: settings.rgbOffset }, 'uAspect': { value: window.innerWidth / window.innerHeight } },
            vertexShader: v,
            fragmentShader: `
                uniform sampler2D tDiffuse; uniform float uOffset, uAspect; varying vec2 vUv;
                void main() {
                    vec2 d = (vUv - 0.5); d.y /= uAspect; float dst = length(d);
                    gl_FragColor = vec4(texture2D(tDiffuse, vUv + d * uOffset * dst).r, texture2D(tDiffuse, vUv).g, texture2D(tDiffuse, vUv - d * uOffset * dst).b, 1.0);
                }
            `
        }));
    }

    function onMouseMove(e) {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const hit = raycaster.intersectObject(groundPlane);
        if (hit.length > 0) pointsMesh.material.uniforms.uMouse.value.copy(hit[0].point);
    }

    function onWindowResize() {
        const a = window.innerWidth / window.innerHeight;
        camera.left = -6.5 * a; camera.right = 6.5 * a;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        const t = clock.getElapsedTime();
        if (pointsMesh) pointsMesh.material.uniforms.time.value = t;
        if (composer) composer.passes[2].uniforms.time.value = t;

        const currentTargetZoom = 1 + (scrollProgress * settings.targetZoomAmount);
        const currentTargetRotX = scrollProgress * settings.targetRotationX;
        const currentTargetRotY = scrollProgress * settings.targetRotationY;

        camera.zoom += (currentTargetZoom - camera.zoom) * 0.1;
        camera.updateProjectionMatrix();

        const mX = -mouse.y * 0.08, mY = mouse.x * 0.08;
        const fX = mX + currentTargetRotX, fY = mY + currentTargetRotY;

        if (model) {
            model.rotation.x += (fX - model.rotation.x) * 0.05;
            model.rotation.y += (fY - model.rotation.y) * 0.05;
        }
        if (pointsMesh) {
            pointsMesh.rotation.x += (fX - pointsMesh.rotation.x) * 0.05;
            pointsMesh.rotation.y += (fY - pointsMesh.rotation.y) * 0.05;
        }

        composer.render();
    }
</script>
</body>
</html>
